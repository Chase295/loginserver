server {
    listen 80;
    server_name localhost; # Or your specific domain if you have one configured for local dev

    # Optional: Improve logging format
    # log_format main '$remote_addr - $remote_user [$time_local] "$request" '
    #                 '$status $body_bytes_sent "$http_referer" '
    #                 '"$http_user_agent" "$http_x_forwarded_for"';
    # access_log /var/log/nginx/access.log main;
    error_log /var/log/nginx/error.log;

    # Proxy API requests to the backend service
    location /api/ {
        proxy_pass http://backend:8000/api/; # Forward to the backend service on port 8000

        # Standard proxy headers
        proxy_set_header Host $host; # Preserve the original host header
        proxy_set_header X-Real-IP $remote_addr; # Pass the real client IP
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; # List of IPs including proxies
        proxy_set_header X-Forwarded-Proto $scheme; # http or https

        # WebSocket support (if your API uses WebSockets, though not explicitly mentioned for this app)
        # proxy_http_version 1.1;
        # proxy_set_header Upgrade $http_upgrade;
        # proxy_set_header Connection "upgrade";

        proxy_redirect off;
    }

    # Proxy all other requests to the frontend service
    location / {
        proxy_pass http://frontend:3000; # Forward to the frontend service on port 3000

        # Standard proxy headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support (if your frontend uses WebSockets, e.g., for hot module reloading in dev)
        # proxy_http_version 1.1;
        # proxy_set_header Upgrade $http_upgrade;
        # proxy_set_header Connection "upgrade";

        proxy_redirect off;
    }

    # Optional: Add a health check endpoint for Nginx itself
    # location /nginx_health {
    #     return 200 "Nginx is healthy";
    #     access_log off; # Don't log health checks
    # }
}
