version: "3.8"

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: watchlist
      POSTGRES_PASSWORD: ${DB_PASSWORD:-watchlist}
      POSTGRES_DB: watchlist
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U watchlist"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://watchlist:${DB_PASSWORD:-watchlist}@db:5432/watchlist
      TMDB_API_KEY: ${TMDB_API_KEY}
      TMDB_ACCESS_TOKEN: ${TMDB_ACCESS_TOKEN}
      JWT_SECRET: ${JWT_SECRET:-change-me-to-a-strong-random-secret}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost,http://localhost:3000}
    ports:
      - "8000:8000"

  frontend:
    build: ./frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  pgdata:
